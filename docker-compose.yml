version: '3.8'  
  
services:  
  mlflow:  
    image: ghcr.io/mlflow/mlflow:v2.10.2  
    ports:  
      - "5001:5000"  
    command: mlflow server --host 0.0.0.0 --port 5000  
  
  serve:  
    build: .  
    ports:  
      - "8001:8000"  
    environment:  
      - MLFLOW_TRACKING_URI=http://mlflow:5000  
      - MODEL_URI=models:/bavar_bled_model/Production  
    depends_on:  
      - mlflow  
